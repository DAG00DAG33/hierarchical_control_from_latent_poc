seed: 0
env_id: PushT-v1
obs_mode: rgb+state_dict
control_mode: pd_ee_delta_pos
control_freq: 20
camera_name: base_camera

paths:
  data_dir: data
  raw_demo_dir: data/raw
  prepared_path: data/prepared/pusht_ppo_dino_proprio_tcp.h5
  artifact_dir: artifacts/ppo_main
  results_dir: results/ppo_main
  rl_dir: artifacts/rl_baseline

data:
  source: privileged_ppo
  max_trajectories: 200
  replay_count: 240
  replay_num_envs: 8
  train_trajectories: [50, 100, 200]
  eval_episodes: 50
  eval_seed: 10000
  batch_size_features: 32

rl:
  sim_backend: auto
  reconfiguration_freq: 1
  total_timesteps: 5000000
  num_envs: 512
  num_steps: 50
  hidden_dim: 256
  learning_rate: 0.0003
  anneal_lr: false
  gamma: 0.8
  gae_lambda: 0.9
  num_minibatches: 32
  update_epochs: 4
  clip_coef: 0.2
  clip_vloss: false
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.1
  partial_reset: true
  eval_partial_reset: false
  save_every_updates: 5
  target_success: 0.9
  eval_num_envs: 256
  eval_episodes: 256
  eval_seed: 50000
  collect_seed: 70000
  collect_min_success: 0.8
  collect_eval_episodes: 256
  collect_max_attempts: 4000

dino:
  model_name: facebook/dinov2-small
  batch_size: 32

representation:
  latent_dim: 64
  hidden_dim: 256
  batch_size: 512
  epochs: 30
  lr: 0.0003
  sigreg_weight: 0.05
  horizons_steps: [1, 2, 5, 10, 20, 40, 80]

policy:
  action_chunk_steps: 8
  flow_steps: 12
  hidden_dim: 512
  batch_size: 512
  epochs: 25
  lr: 0.0003
  high_level_horizons_s: [0.25, 1.0, 4.0]
  high_level_refresh_fraction: 0.25

sweep:
  profile: staged
  seeds: [0]
