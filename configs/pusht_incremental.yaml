seed: 0
env_id: PushT-v1
obs_mode: state
control_mode: pd_ee_delta_pos
control_freq: 20

dino:
  model_name: facebook/dinov2-small
  feature_type: spatial
  spatial_pool: 4
  batch_size: 64

paths:
  rl_dir: artifacts/rl_pusht_official
  incremental_data_dir: data/incremental
  incremental_artifact_dir: artifacts/incremental
  incremental_results_dir: results/incremental

policy:
  clip_actions_to_env_space: true
  action_low: [-1.0, -1.0, -1.0]
  action_high: [1.0, 1.0, 1.0]

rl:
  sim_backend: physx_cuda
  eval_num_envs: 256
  eval_episodes: 500
  eval_seed: 10000
  eval_reconfiguration_freq: 1
  eval_partial_reset: false

incremental:
  phase0:
    scalar_sim_backend: physx_cuda
    eval_episodes: 100
    eval_seed: 10000
    audit_successful_trajectories: 10
    audit_max_attempts: 100
    audit_seed: 20000
    overfit_hidden_dim: 256
    overfit_max_steps: 100000
    overfit_lr: 0.001
    overfit_target_normalized_mae: 0.00001
    transition_replay_tolerance: 0.00001
  phase1:
    query_episodes: 2600
    query_num_envs: 256
    query_seed: 30000
    train_episodes: 2000
    validation_episodes: 200
    hidden_dim: 256
    batch_size: 4096
    epochs: 300
    lr: 0.001
    eval_episodes: 100
    eval_seed: 10000
    normalize_inputs: true
  phase2:
    dagger_queries_per_iteration: 50000
    dagger_num_envs: 256
    dagger_seed: 40000
    epochs: 100
    batch_size: 4096
    lr: 0.0001
    eval_episodes: 100
    eval_seed: 10000
    recovery_samples: 128
    recovery_seed: 50000
    recovery_xy_std_m: 0.01
    recovery_yaw_std_deg: 5.0
    recovery_max_steps: 100
  phase3:
    dagger_iteration: 3
    label_kind: deterministic_clipped
    hidden_dim: 256
    batch_size: 4096
    epochs: 200
    lr: 0.0005
    flow_steps: 24
    eval_episodes: 100
    eval_seed: 10000
    eval_samples: 8
    eval_mode: zero_noise
    validation_action_interval: 10
    validation_action_subset: 4096
    endpoint_consistency_weight: 20.0
    endpoint_consistency_steps: 4
    endpoint_consistency_batch: 512
    overfit_steps: 5000
    overfit_lr: 0.001
  phase4:
    prepared_path: data/prepared/pusht_ppo_dino_spatial_proprio_tcp.h5
    train_episodes: 1800
    validation_episodes: 200
    history_lengths: [1, 2, 4, 8]
    architecture: concat
    hidden_dim: 512
    batch_size: 512
    batches_per_epoch: 500
    epochs: 50
    lr: 0.0003
    validation_queries: 10000
    eval_episodes: 100
    eval_seed: 10000
    eval_num_envs: 64
    probe_samples: 8000
    probe_epochs: 100
    probe_batch_size: 512
    probe_hidden_dim: 512
    probe_lr: 0.001
    probe_contact_distance_m: 0.08
