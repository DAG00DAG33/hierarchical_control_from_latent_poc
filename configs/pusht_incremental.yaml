seed: 0
env_id: PushT-v1
obs_mode: state
control_mode: pd_ee_delta_pos
control_freq: 20

dino:
  model_name: facebook/dinov2-small
  feature_type: spatial
  spatial_pool: 4
  batch_size: 64

paths:
  rl_dir: artifacts/rl_pusht_official
  incremental_data_dir: data/incremental
  incremental_artifact_dir: artifacts/incremental
  incremental_results_dir: results/incremental

policy:
  clip_actions_to_env_space: true
  action_low: [-1.0, -1.0, -1.0]
  action_high: [1.0, 1.0, 1.0]

rl:
  sim_backend: physx_cuda
  eval_num_envs: 256
  eval_episodes: 500
  eval_seed: 10000
  eval_reconfiguration_freq: 1
  eval_partial_reset: false

low_level_rl:
  num_envs: 32
  # One complete local MDP per PPO rollout. The RL rerun trainer verifies this
  # against the selected high/low interface horizon.
  rollout_steps: 10
  num_minibatches: 8
  update_epochs: 4
  residual_width: 256
  residual_depth: 2
  initial_logstd: -2.3
  direct_initial_logstd: -4.0
  learning_rate: 0.0001
  direct_learning_rate: 0.00003
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  entropy_coef: 0.0
  value_coef: 1.0
  max_grad_norm: 1.0
  residual_penalty_weight: 0.01
  checkpoint_every_steps: 25000
  train_seed_start: 3000000
  development_seed_start: 3200000
  final_seed_start: 3400000
  eval_num_envs: 32
  segment_terminates_gae: true

