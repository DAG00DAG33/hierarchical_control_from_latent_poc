seed: 0
env_id: PushT-v1
obs_mode: rgb+state_dict
control_mode: pd_ee_delta_pos
control_freq: 20
camera_name: base_camera

paths:
  data_dir: data
  raw_demo_dir: data/raw
  prepared_path: data/prepared/pusht_dino_proprio.h5
  artifact_dir: artifacts/smoke
  results_dir: results/smoke
  rl_dir: artifacts/rl_smoke

data:
  max_trajectories: 200
  replay_count: 240
  replay_num_envs: 8
  train_trajectories: [2]
  eval_episodes: 1
  eval_seed: 12000
  batch_size_features: 32

rl:
  sim_backend: physx_cpu
  allow_cpu: true
  reconfiguration_freq:
  eval_reconfiguration_freq: 1
  collect_reconfiguration_freq: 1
  total_timesteps: 16
  num_envs: 1
  num_steps: 8
  hidden_dim: 32
  learning_rate: 0.0003
  anneal_lr: false
  gamma: 0.8
  gae_lambda: 0.9
  num_minibatches: 1
  update_epochs: 1
  clip_coef: 0.2
  clip_vloss: false
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl:
  partial_reset: true
  eval_partial_reset: false
  save_every_updates: 1
  target_success: 2.0
  eval_num_envs: 1
  eval_episodes: 1
  eval_seed: 50000
  collect_seed: 70000
  collect_min_success:
  collect_eval_episodes: 1
  collect_max_attempts: 2

dino:
  model_name: facebook/dinov2-small
  batch_size: 32

representation:
  latent_dim: 16
  hidden_dim: 64
  batch_size: 64
  epochs: 2
  lr: 0.0003
  sigreg_weight: 0.05
  horizons_steps: [1, 2, 5]

policy:
  action_chunk_steps: 4
  flow_steps: 2
  hidden_dim: 64
  batch_size: 64
  epochs: 2
  lr: 0.0003
  high_level_horizons_s: [0.25]
  high_level_refresh_fraction: 0.25

sweep:
  profile: staged
  seeds: [0]
